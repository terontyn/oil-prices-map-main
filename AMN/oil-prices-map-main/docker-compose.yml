version: '3.8'

services:
  monitoring:
    build: .
    container_name: amn_monitoring
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/output
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: amn_web
    ports:
      - "80:80"
    volumes:
      - ./output:/usr/share/nginx/html:ro
    restart: unless-stopped
